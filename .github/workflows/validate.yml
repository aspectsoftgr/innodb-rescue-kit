name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check PowerShell parser syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Get-ChildItem scripts -Filter *.ps1 | ForEach-Object {
            Write-Host "Parsing $($_.FullName)"
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
            }
          }

      - name: Compile Python scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          @'
          import pathlib
          import py_compile
          import tempfile

          with tempfile.TemporaryDirectory() as cache_dir:
              cache_root = pathlib.Path(cache_dir)
              for script in pathlib.Path('scripts').glob('*.py'):
                  cfile = cache_root / script.with_suffix('.pyc').name
                  py_compile.compile(str(script), cfile=str(cfile), doraise=True)
          '@ | python -

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          Invoke-ScriptAnalyzer -Path scripts -Recurse -Severity Error

      - name: Repository sanity checks
        shell: pwsh
        run: |
          python tests/validate_repository.py
