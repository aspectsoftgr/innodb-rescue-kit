name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check PowerShell parser syntax
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Get-ChildItem scripts -Filter *.ps1 | ForEach-Object {
            Write-Host "Parsing $($_.FullName)"
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
            }
          }

      - name: Compile Python scripts
        shell: pwsh
        run: |
          python -m py_compile scripts/03-dbsake-blobfix-runner.py

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          Invoke-ScriptAnalyzer -Path scripts -Recurse -Severity Error

      - name: Repository sanity checks
        shell: pwsh
        run: |
          python tests/validate_repository.py
