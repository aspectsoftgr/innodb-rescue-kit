name: Recovery question
description: Ask a usage/recovery question
title: "[Question]: "
labels: ["question"]
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Describe the recovery situation.
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Files present
      description: Do `.frm` and `.ibd` files exist?
      render: text
  - type: textarea
    id: errors
    attributes:
      label: Error messages
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I did not include private database dumps, passwords, or personal data.
          required: true
